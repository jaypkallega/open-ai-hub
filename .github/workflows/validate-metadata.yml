name: Validate Asset Metadata

# Run this check on every Pull Request that touches asset files
on:
  pull_request:
    paths:
      - 'prompts/**'
      - 'skills/**'
      - 'templates/**'
      - 'experimental/**'

jobs:
  validate:
    name: Check YAML Front Matter
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Download the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3 — Install the YAML reading library
      - name: Install dependencies
        run: pip install pyyaml

      # Step 4 — Run the validation script
      - name: Validate metadata
        run: python .github/scripts/validate_metadata.py
